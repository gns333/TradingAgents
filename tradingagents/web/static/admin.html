<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TradingAgents 后台</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #fff;
      --line: #d9dfe7;
      --line-soft: #edf1f5;
      --text: #17202a;
      --muted: #647386;
      --accent: #147a63;
      --accent-weak: #e3f2ed;
      --danger: #b42318;
      --warn: #9a5b00;
      --shadow: 0 12px 30px rgba(31, 42, 55, .07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .94);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    h1 { margin: 0; font-size: 19px; letter-spacing: 0; }
    a { color: var(--accent); text-decoration: none; font-weight: 700; }
    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
      padding: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-header {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .panel-header h2 { margin: 0; font-size: 14px; }
    .panel-body { padding: 14px; }
    .grid { display: grid; gap: 14px; }
    .two-col { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    label {
      display: block;
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }
    input, select, textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    textarea { min-height: 70px; resize: vertical; }
    button {
      height: 36px;
      border: 0;
      border-radius: 6px;
      padding: 0 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 750;
      cursor: pointer;
    }
    button.secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }
    button.danger {
      background: var(--danger);
    }
    button.inline {
      width: auto;
      min-width: 74px;
    }
    .status {
      min-height: 34px;
      padding: 8px 10px;
      border-radius: 6px;
      background: var(--accent-weak);
      color: var(--accent);
      font-size: 13px;
    }
    .status.warn {
      background: #fff7e6;
      color: var(--warn);
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      background: #fbfcfd;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef1f4;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }
    .pill.active, .pill.default {
      background: var(--accent-weak);
      color: var(--accent);
    }
    .pill.blocked {
      background: #fff1f0;
      color: var(--danger);
    }
    .hide { display: none; }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>TradingAgents 后台</h1>
    <a href="/">返回分析</a>
  </header>
  <main>
    <aside class="grid">
      <div class="panel" id="auth-panel">
        <div class="panel-header"><h2>管理员</h2></div>
        <div class="panel-body grid">
          <div class="status warn" id="auth-note">读取状态中</div>
          <div>
            <label for="admin-password">管理员密码</label>
            <input id="admin-password" type="password" autocomplete="current-password">
          </div>
          <button id="auth-submit">登录</button>
        </div>
      </div>

      <div class="panel hide" id="whitelist-form-panel">
        <div class="panel-header"><h2>白名单</h2></div>
        <div class="panel-body grid">
          <div>
            <label for="wl-email">邮箱</label>
            <input id="wl-email" autocomplete="off">
          </div>
          <div>
            <label for="wl-uid">UID</label>
            <input id="wl-uid" autocomplete="off">
          </div>
          <div class="two-col">
            <div>
              <label for="wl-status">状态</label>
              <select id="wl-status">
                <option value="active">启用</option>
                <option value="pending">待确认</option>
                <option value="blocked">禁用</option>
              </select>
            </div>
            <div>
              <label for="wl-limit">每日次数</label>
              <input id="wl-limit" type="number" min="0" value="5">
            </div>
          </div>
          <div>
            <label for="wl-note">备注</label>
            <textarea id="wl-note"></textarea>
          </div>
          <button id="save-whitelist">保存白名单</button>
        </div>
      </div>
    </aside>

    <section class="grid hide" id="admin-main">
      <div class="panel">
        <div class="panel-header">
          <h2>模型配置</h2>
          <span class="pill">API Key 加密入库</span>
        </div>
        <div class="panel-body grid">
          <div class="two-col">
            <div>
              <label for="model-name">显示名称</label>
              <input id="model-name" value="DeepSeek 默认">
            </div>
            <div>
              <label for="model-provider">供应商</label>
              <select id="model-provider">
                <option value="deepseek">DeepSeek</option>
                <option value="openai">OpenAI</option>
                <option value="openai_compatible">OpenAI-compatible</option>
                <option value="anthropic">Anthropic</option>
                <option value="google">Google</option>
                <option value="qwen-cn">通义千问</option>
              </select>
            </div>
          </div>
          <div>
            <label for="model-base-url">Base URL</label>
            <input id="model-base-url" placeholder="留空使用供应商默认地址">
          </div>
          <div class="two-col">
            <div>
              <label for="model-quick">快速模型</label>
              <input id="model-quick" value="deepseek-v4-flash">
            </div>
            <div>
              <label for="model-deep">深度模型</label>
              <input id="model-deep" value="deepseek-v4-pro">
            </div>
          </div>
          <div>
            <label for="model-key">API Key</label>
            <input id="model-key" type="password" autocomplete="new-password">
          </div>
          <div class="toolbar">
            <button class="secondary inline" id="reset-model-form">清空</button>
            <button class="inline" id="save-model">保存模型</button>
          </div>
          <div class="status warn">后台只返回脱敏 Key。编辑已有配置时，API Key 留空会保留旧值。</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>模型列表</h2></div>
        <div class="panel-body"><table id="model-table"></table></div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>白名单列表</h2></div>
        <div class="panel-body"><table id="whitelist-table"></table></div>
      </div>
    </section>
  </main>

  <script>
    let adminToken = localStorage.getItem('ta_admin_token') || '';
    let editingModelId = null;

    const authNote = document.getElementById('auth-note');
    const authSubmit = document.getElementById('auth-submit');
    const adminPassword = document.getElementById('admin-password');
    const adminMain = document.getElementById('admin-main');
    const whitelistFormPanel = document.getElementById('whitelist-form-panel');

    function authHeaders() {
      return adminToken ? { Authorization: `Bearer ${adminToken}` } : {};
    }

    async function api(path, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...authHeaders(), ...(options.headers || {}) };
      const res = await fetch(path, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || data.message || `HTTP ${res.status}`);
      return data;
    }

    async function loadStatus() {
      const status = await api('/api/admin/status');
      authSubmit.textContent = status.password_configured ? '登录' : '初始化';
      authNote.textContent = status.password_configured ? '请输入管理员密码' : '首次使用，请设置管理员密码';
      if (adminToken) {
        try {
          await loadAdminData();
          showAdmin();
        } catch {
          adminToken = '';
          localStorage.removeItem('ta_admin_token');
        }
      }
    }

    function showAdmin() {
      adminMain.classList.remove('hide');
      whitelistFormPanel.classList.remove('hide');
      authNote.textContent = '已登录';
    }

    authSubmit.addEventListener('click', async () => {
      try {
        const status = await api('/api/admin/status');
        const endpoint = status.password_configured ? '/api/admin/login' : '/api/admin/setup';
        await api(endpoint, { method: 'POST', body: JSON.stringify({ password: adminPassword.value }) });
        if (!status.password_configured) {
          authNote.textContent = '初始化完成，请登录';
          authSubmit.textContent = '登录';
          adminPassword.value = '';
          return;
        }
        const login = await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ password: adminPassword.value }) });
        adminToken = login.token;
        localStorage.setItem('ta_admin_token', adminToken);
        adminPassword.value = '';
        showAdmin();
        await loadAdminData();
      } catch (err) {
        authNote.textContent = err.message;
        authNote.classList.add('warn');
      }
    });

    function modelPayload() {
      return {
        id: editingModelId,
        display_name: document.getElementById('model-name').value,
        provider: document.getElementById('model-provider').value,
        base_url: document.getElementById('model-base-url').value,
        quick_model: document.getElementById('model-quick').value,
        deep_model: document.getElementById('model-deep').value,
        api_key: document.getElementById('model-key').value,
        enabled: true,
        is_default: false
      };
    }

    function resetModelForm() {
      editingModelId = null;
      document.getElementById('model-name').value = 'DeepSeek 默认';
      document.getElementById('model-provider').value = 'deepseek';
      document.getElementById('model-base-url').value = '';
      document.getElementById('model-quick').value = 'deepseek-v4-flash';
      document.getElementById('model-deep').value = 'deepseek-v4-pro';
      document.getElementById('model-key').value = '';
    }

    document.getElementById('reset-model-form').addEventListener('click', resetModelForm);
    document.getElementById('save-model').addEventListener('click', async () => {
      await api('/api/admin/model-configs', { method: 'POST', body: JSON.stringify(modelPayload()) });
      resetModelForm();
      await loadModels();
    });

    document.getElementById('save-whitelist').addEventListener('click', async () => {
      await api('/api/admin/whitelist', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('wl-email').value,
          uid: document.getElementById('wl-uid').value,
          status: document.getElementById('wl-status').value,
          daily_limit: Number(document.getElementById('wl-limit').value || 0),
          note: document.getElementById('wl-note').value
        })
      });
      document.getElementById('wl-email').value = '';
      document.getElementById('wl-uid').value = '';
      document.getElementById('wl-note').value = '';
      await loadWhitelist();
    });

    async function loadModels() {
      const data = await api('/api/admin/model-configs');
      const table = document.getElementById('model-table');
      table.innerHTML = '<thead><tr><th>名称</th><th>供应商</th><th>模型</th><th>Key</th><th>状态</th><th>操作</th></tr></thead><tbody></tbody>';
      const body = table.querySelector('tbody');
      data.items.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.display_name}</td>
          <td>${item.provider}</td>
          <td>${item.quick_model}<br>${item.deep_model}</td>
          <td>${item.api_key_masked}</td>
          <td>${item.is_default ? '<span class="pill default">默认</span>' : '<span class="pill">可用</span>'}</td>
          <td>
            <button class="secondary inline" data-action="edit">编辑</button>
            <button class="secondary inline" data-action="default">默认</button>
            <button class="danger inline" data-action="delete">删除</button>
          </td>`;
        tr.querySelector('[data-action="edit"]').onclick = () => {
          editingModelId = item.id;
          document.getElementById('model-name').value = item.display_name;
          document.getElementById('model-provider').value = item.provider;
          document.getElementById('model-base-url').value = item.base_url || '';
          document.getElementById('model-quick').value = item.quick_model;
          document.getElementById('model-deep').value = item.deep_model;
          document.getElementById('model-key').value = '';
        };
        tr.querySelector('[data-action="default"]').onclick = async () => {
          await api(`/api/admin/model-configs/${item.id}/set-default`, { method: 'POST' });
          await loadModels();
        };
        tr.querySelector('[data-action="delete"]').onclick = async () => {
          await api(`/api/admin/model-configs/${item.id}`, { method: 'DELETE' });
          await loadModels();
        };
        body.appendChild(tr);
      });
    }

    async function loadWhitelist() {
      const data = await api('/api/admin/whitelist');
      const table = document.getElementById('whitelist-table');
      table.innerHTML = '<thead><tr><th>邮箱</th><th>UID</th><th>状态</th><th>每日次数</th><th>备注</th><th>操作</th></tr></thead><tbody></tbody>';
      const body = table.querySelector('tbody');
      data.items.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.email}</td>
          <td>${item.uid || ''}</td>
          <td><span class="pill ${item.status}">${item.status}</span></td>
          <td>${item.daily_limit}</td>
          <td>${item.note || ''}</td>
          <td><button class="danger inline">删除</button></td>`;
        tr.querySelector('button').onclick = async () => {
          await api(`/api/admin/whitelist/${item.id}`, { method: 'DELETE' });
          await loadWhitelist();
        };
        body.appendChild(tr);
      });
    }

    async function loadAdminData() {
      await Promise.all([loadModels(), loadWhitelist()]);
    }

    loadStatus().catch(err => { authNote.textContent = err.message; });
  </script>
</body>
</html>
