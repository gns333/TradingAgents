<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TradingAgents 工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/workbench.css">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <aside class="sidebar" aria-label="主导航">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">TA</div>
        <div>
          <h1>TradingAgents</h1>
          <p>A股分析终端</p>
        </div>
      </div>

      <nav class="nav-list" id="primary-nav">
        <button class="nav-item active" type="button" data-view="analysis">个股分析</button>
        <button class="nav-item" type="button" data-view="reports">报告中心</button>
        <button class="nav-item nav-admin" type="button" data-view="admin">后台管理</button>
      </nav>

      <section class="identity-card" aria-labelledby="identity-title">
        <div class="identity-head">
          <h2 id="identity-title">本地访问身份</h2>
          <span class="dot-badge pending" id="identity-state">未设置</span>
        </div>
        <div class="identity-account">
          <span class="identity-email-value" id="identity-summary">未设置邮箱</span>
          <button class="secondary-button identity-edit" type="button" id="open-identity-modal">更改</button>
        </div>
      </section>
    </aside>

    <div class="main-shell">
      <header class="topbar">
        <div class="topbar-titles">
          <h2 id="view-title">个股分析</h2>
        </div>
        <div class="ticker-bar" id="ticker-bar" aria-live="polite"></div>
        <div class="topbar-context" id="topbar-context" hidden></div>
        <div class="topbar-spacer"></div>
        <div class="topbar-actions">
          <span class="state-pill" id="global-run-state">空闲</span>
          <button class="icon-button theme-toggle" type="button" id="theme-toggle" aria-label="切换深浅色主题" title="切换主题">
            <span class="ico-moon" aria-hidden="true">☾</span>
            <span class="ico-sun" aria-hidden="true">☀</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="view active" id="view-analysis" data-title="个股分析">
          <div id="analysis-root"></div>
        </section>
        <section class="view" id="view-reports" data-title="报告中心">
          <div id="reports-root"></div>
        </section>
        <section class="view" id="view-admin" data-title="后台管理">
          <div id="admin-root"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="identity-modal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="identity-modal-title">
      <div class="modal-header">
        <h2 id="identity-modal-title">更改本地访问身份</h2>
        <button class="icon-button" type="button" id="close-identity-modal" aria-label="关闭" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <p class="helper-text">临时用于匹配邮箱白名单。接入正式登录后，将由登录态自动提供身份。</p>
        <div>
          <label for="identity-email">邮箱</label>
          <input id="identity-email" type="email" autocomplete="email" placeholder="name@example.com">
        </div>
        <div class="modal-identity-status">
          <span id="identity-modal-status">尚未保存</span>
          <span class="dot-badge pending" id="identity-modal-state">待设置</span>
        </div>
        <div class="modal-actions">
          <button class="secondary-button" type="button" id="cancel-identity-modal">取消</button>
          <button type="button" id="save-identity">保存身份</button>
        </div>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="admin-modal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="admin-modal-title">
      <div class="modal-header">
        <h2 id="admin-modal-title">管理员登录</h2>
        <button class="icon-button" type="button" id="close-admin-modal" aria-label="关闭">×</button>
      </div>
      <div id="admin-auth-root"></div>
    </section>
  </div>

  <div class="modal-backdrop cloudbase-auth-backdrop" id="cloudbase-auth-modal" hidden>
    <section class="modal-panel cloudbase-auth-modal" id="cloudbase-auth-panel" data-mode="login" role="dialog" aria-modal="true" aria-labelledby="cloudbase-auth-title">
      <div class="modal-header">
        <div class="cloudbase-auth-brand">
          <span class="cloudbase-auth-brand-mark" aria-hidden="true">TA</span>
          <span><strong>TradingAgents</strong><small>A股分析终端</small></span>
        </div>
        <button class="icon-button" type="button" id="close-cloudbase-auth-modal" aria-label="关闭" title="关闭">×</button>
      </div>
      <div class="cloudbase-auth-content">
        <div class="cloudbase-auth-heading">
          <div class="cloudbase-auth-heading-row">
            <button class="cloudbase-auth-back" type="button" id="cloudbase-auth-back" aria-label="返回登录" title="返回登录">←</button>
            <h2 id="cloudbase-auth-title">欢迎回来</h2>
          </div>
          <p id="cloudbase-auth-subtitle">使用邮箱和密码登录，继续查看分析任务与报告。</p>
        </div>

        <div class="auth-mode-tabs" role="tablist" aria-label="账号操作">
          <button class="auth-mode-tab active" type="button" id="show-cloudbase-login" role="tab" aria-selected="true">登录</button>
          <button class="auth-mode-tab" type="button" id="show-cloudbase-register" role="tab" aria-selected="false">注册</button>
        </div>

        <form class="cloudbase-auth-panel" id="cloudbase-login-panel" data-auth-form="login">
          <div class="cloudbase-auth-field">
            <label for="cloudbase-login-email">邮箱</label>
            <input id="cloudbase-login-email" type="email" autocomplete="email" placeholder="name@example.com" required>
          </div>
          <div class="cloudbase-auth-field">
            <div class="cloudbase-auth-label-row">
              <label for="cloudbase-login-password">密码</label>
              <button class="cloudbase-auth-text-button" type="button" id="show-cloudbase-reset">忘记密码？</button>
            </div>
            <div class="cloudbase-password-field">
              <input id="cloudbase-login-password" type="password" autocomplete="current-password" placeholder="输入密码" required>
              <button class="cloudbase-password-toggle" type="button" data-password-toggle="cloudbase-login-password" aria-label="显示密码" title="显示密码">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></svg>
              </button>
            </div>
          </div>
          <button class="cloudbase-auth-submit" type="submit" id="cloudbase-sign-in">登录</button>
          <p class="cloudbase-auth-switch">还没有账号？ <button class="cloudbase-auth-text-button" type="button" data-auth-mode="register">创建账号</button></p>
        </form>

        <form class="cloudbase-auth-panel" id="cloudbase-register-panel" data-auth-form="register" hidden>
          <div class="cloudbase-auth-field">
            <label for="cloudbase-register-email">邮箱</label>
            <input id="cloudbase-register-email" type="email" autocomplete="email" placeholder="name@example.com" required>
          </div>
          <div class="cloudbase-auth-field">
            <label for="cloudbase-register-code">邮箱验证码</label>
            <div class="cloudbase-auth-code-row">
              <input id="cloudbase-register-code" inputmode="numeric" autocomplete="one-time-code" placeholder="6 位验证码" pattern="[0-9]{6}" maxlength="6" required>
              <button class="secondary-button cloudbase-auth-code-button" type="button" id="cloudbase-send-code">发送验证码</button>
            </div>
          </div>
          <div class="cloudbase-auth-field">
            <label for="cloudbase-register-password">设置密码</label>
            <div class="cloudbase-password-field">
              <input id="cloudbase-register-password" type="password" autocomplete="new-password" placeholder="至少 8 位，包含字母和数字" minlength="8" maxlength="64" required>
              <button class="cloudbase-password-toggle" type="button" data-password-toggle="cloudbase-register-password" aria-label="显示密码" title="显示密码">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></svg>
              </button>
            </div>
            <p class="cloudbase-auth-helper">8-64 位，至少包含一个字母和一个数字。</p>
          </div>
          <div class="cloudbase-auth-field">
            <label for="cloudbase-register-confirm">确认密码</label>
            <div class="cloudbase-password-field">
              <input id="cloudbase-register-confirm" type="password" autocomplete="new-password" placeholder="再次输入密码" minlength="8" maxlength="64" required>
              <button class="cloudbase-password-toggle" type="button" data-password-toggle="cloudbase-register-confirm" aria-label="显示密码" title="显示密码">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></svg>
              </button>
            </div>
          </div>
          <button class="cloudbase-auth-submit" type="submit" id="cloudbase-sign-up">创建账号</button>
          <p class="cloudbase-auth-switch">已有账号？ <button class="cloudbase-auth-text-button" type="button" data-auth-mode="login">返回登录</button></p>
        </form>

        <form class="cloudbase-auth-panel" id="cloudbase-reset-panel" data-auth-form="reset" hidden>
          <div class="cloudbase-auth-field">
            <label for="cloudbase-reset-email">邮箱</label>
            <input id="cloudbase-reset-email" type="email" autocomplete="email" placeholder="name@example.com" required>
          </div>
          <div class="cloudbase-auth-field">
            <label for="cloudbase-reset-code">邮箱验证码</label>
            <div class="cloudbase-auth-code-row">
              <input id="cloudbase-reset-code" inputmode="numeric" autocomplete="one-time-code" placeholder="6 位验证码" pattern="[0-9]{6}" maxlength="6" required>
              <button class="secondary-button cloudbase-auth-code-button" type="button" id="cloudbase-send-reset-code">发送验证码</button>
            </div>
          </div>
          <div class="cloudbase-auth-field">
            <label for="cloudbase-reset-password">新密码</label>
            <div class="cloudbase-password-field">
              <input id="cloudbase-reset-password" type="password" autocomplete="new-password" placeholder="至少 8 位，包含字母和数字" minlength="8" maxlength="64" required>
              <button class="cloudbase-password-toggle" type="button" data-password-toggle="cloudbase-reset-password" aria-label="显示密码" title="显示密码">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></svg>
              </button>
            </div>
            <p class="cloudbase-auth-helper">8-64 位，至少包含一个字母和一个数字。</p>
          </div>
          <div class="cloudbase-auth-field">
            <label for="cloudbase-reset-confirm">确认新密码</label>
            <div class="cloudbase-password-field">
              <input id="cloudbase-reset-confirm" type="password" autocomplete="new-password" placeholder="再次输入新密码" minlength="8" maxlength="64" required>
              <button class="cloudbase-password-toggle" type="button" data-password-toggle="cloudbase-reset-confirm" aria-label="显示密码" title="显示密码">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></svg>
              </button>
            </div>
          </div>
          <button class="cloudbase-auth-submit" type="submit" id="cloudbase-reset-password-submit">重置密码</button>
        </form>

        <div class="form-status" id="cloudbase-auth-status" aria-live="polite"></div>
      </div>
    </section>
  </div>

  <script src="/assets/workbench.js" defer></script>
</body>
</html>
