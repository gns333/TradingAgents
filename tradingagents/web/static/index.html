<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TradingAgents 工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/workbench.css">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <aside class="sidebar" aria-label="主导航">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">TA</div>
        <div>
          <h1>TradingAgents</h1>
          <p>A股分析终端</p>
        </div>
      </div>

      <nav class="nav-list" id="primary-nav">
        <button class="nav-item active" type="button" data-view="analysis">个股分析</button>
        <button class="nav-item" type="button" data-view="reports">报告中心</button>
        <button class="nav-item nav-admin" type="button" data-view="admin">后台管理</button>
      </nav>

      <section class="identity-card" aria-labelledby="identity-title">
        <div class="identity-head">
          <h2 id="identity-title">本地访问身份</h2>
          <span class="dot-badge pending" id="identity-state">未设置</span>
        </div>
        <div class="identity-account">
          <span class="identity-email-value" id="identity-summary">未设置邮箱</span>
          <button class="secondary-button identity-edit" type="button" id="open-identity-modal">更改</button>
        </div>
      </section>
    </aside>

    <div class="main-shell">
      <header class="topbar">
        <div class="topbar-titles">
          <h2 id="view-title">个股分析</h2>
        </div>
        <div class="ticker-bar" id="ticker-bar" aria-live="polite"></div>
        <div class="topbar-context" id="topbar-context" hidden></div>
        <div class="topbar-spacer"></div>
        <div class="topbar-actions">
          <span class="state-pill" id="global-run-state">空闲</span>
          <button class="icon-button theme-toggle" type="button" id="theme-toggle" aria-label="切换深浅色主题" title="切换主题">
            <span class="ico-moon" aria-hidden="true">☾</span>
            <span class="ico-sun" aria-hidden="true">☀</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="view active" id="view-analysis" data-title="个股分析">
          <div id="analysis-root"></div>
        </section>
        <section class="view" id="view-reports" data-title="报告中心">
          <div id="reports-root"></div>
        </section>
        <section class="view" id="view-admin" data-title="后台管理">
          <div id="admin-root"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="identity-modal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="identity-modal-title">
      <div class="modal-header">
        <h2 id="identity-modal-title">更改本地访问身份</h2>
        <button class="icon-button" type="button" id="close-identity-modal" aria-label="关闭" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <p class="helper-text">临时用于匹配邮箱白名单。接入正式登录后，将由登录态自动提供身份。</p>
        <div>
          <label for="identity-email">邮箱</label>
          <input id="identity-email" type="email" autocomplete="email" placeholder="name@example.com">
        </div>
        <div class="modal-identity-status">
          <span id="identity-modal-status">尚未保存</span>
          <span class="dot-badge pending" id="identity-modal-state">待设置</span>
        </div>
        <div class="modal-actions">
          <button class="secondary-button" type="button" id="cancel-identity-modal">取消</button>
          <button type="button" id="save-identity">保存身份</button>
        </div>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="admin-modal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="admin-modal-title">
      <div class="modal-header">
        <h2 id="admin-modal-title">管理员登录</h2>
        <button class="icon-button" type="button" id="close-admin-modal" aria-label="关闭">×</button>
      </div>
      <div id="admin-auth-root"></div>
    </section>
  </div>

  <div class="modal-backdrop" id="cloudbase-auth-modal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="cloudbase-auth-title">
      <div class="modal-header">
        <h2 id="cloudbase-auth-title">登录 TradingAgents</h2>
        <button class="icon-button" type="button" id="close-cloudbase-auth-modal" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <p class="helper-text">使用 CloudBase 中已启用的账号登录。登录身份和管理员角色均由服务端校验。</p>
        <div>
          <label for="cloudbase-username">账号</label>
          <input id="cloudbase-username" autocomplete="username" placeholder="邮箱、手机号或用户名">
        </div>
        <div>
          <label for="cloudbase-password">密码</label>
          <input id="cloudbase-password" type="password" autocomplete="current-password">
        </div>
        <div class="form-status" id="cloudbase-auth-status" aria-live="polite"></div>
        <div class="modal-actions">
          <button type="button" id="cloudbase-sign-in">登录</button>
        </div>
      </div>
    </section>
  </div>

  <script src="/assets/workbench.js" defer></script>
</body>
</html>
